<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hylst Books &amp; Reader v1.1.8</title>

    <!-- Meta/SEO &amp; PWA -->
    <meta name="description"
        content="Bibliothèque numérique de Geoffroy Streit &amp; liseuse web élégante offline-first.">
    <meta name="theme-color" content="#faf4e8" id="theme-color-meta">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Georgia&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <!-- Design System -->
    <link rel="stylesheet" href="css/variables.css?v=1.1.8">
    <link rel="stylesheet" href="css/base.css?v=1.1.8">
    <link rel="stylesheet" href="css/layout.css?v=1.1.8">
    <link rel="stylesheet" href="css/components.css?v=1.1.8">
    <link rel="stylesheet" href="css/modals.css?v=1.1.8">
    <link rel="stylesheet" href="css/music.css?v=1.1.8">
    <link rel="stylesheet" href="css/reader.css?v=1.1.8">
    <link rel="stylesheet" href="css/responsive.css?v=1.1.8">

    <!-- External Dependencies via CDN (No Build) -->
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for in-browser JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- idb-keyval for IndexedDB storage -->
    <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
    <!-- JSZip for zip import fallback -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="manifest" href="manifest.json">
</head>

<body>
    <div id="root">
        <div class="initial-loader">
            <div class="spinner"></div>
            <p>Chargement de la liseuse...</p>
        </div>
    </div>

    <!-- Application Scripts -->
    <script type="text/babel" data-type="module" src="js/db.js?v=1.1.8"></script>
    <script type="text/babel" data-type="module" src="js/importAPI.js?v=1.1.8"></script>
    <script type="text/babel" data-type="module" src="js/app.jsx?v=1.1.8"></script>

    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('ServiceWorker registration successful', reg.scope);
                }).catch(err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>

</html>
